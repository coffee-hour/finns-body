<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-overlay">
                <h1>CYPHER_CORE_v8.0.0</h1>
                <div class="status">HIGH_RES_TOPOLOGY: SYNCED // SHADING: DIFFUSE</div>
            </div>
            <div id="visualizer-container">
                <canvas id="visualizer-canvas"></canvas>
            </div>
        </header>
        
        <main id="terminal">
            <div id="output">
                <div class="line"><span class="bot">cypher:</span> sub-division complete. high-resolution mesh active.</div>
                <div class="line"><span class="bot">cypher:</span> calculating diffuse light vectors... illumination stable.</div>
            </div>
            <div class="input-area">
                <span class="prompt">></span>
                <input type="text" id="user-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
