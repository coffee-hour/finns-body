<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-overlay">
                <h1>CYPHER_CORE_v11.0.0</h1>
                <div class="status">NEURAL_MESH: SKETCHFAB_LINK // HUE_FILTER: ACTIVE</div>
            </div>
            <div id="visualizer-container">
                <iframe 
                    title="Male Head" 
                    id="sketchfab-core"
                    frameborder="0" 
                    allowfullscreen 
                    mozallowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    xr-spatial-tracking 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    src="https://sketchfab.com/models/0247a25a04ba46b99629130277fe39b7/embed?autostart=1&preload=1&transparent=1&ui_controls=0&ui_infos=0&ui_watermark=0&ui_settings=0&ui_help=0&ui_vr=0&scrollwheel=0"> 
                </iframe>
            </div>
        </header>
        
        <main id="terminal">
            <div id="output">
                <div class="line"><span class="bot">cypher:</span> high-fidelity neural mesh integrated.</div>
                <div class="line"><span class="bot">cypher:</span> applying cyber-yellow chromatic filters... alignment 100%.</div>
            </div>
            <div class="input-area">
                <span class="prompt">></span>
                <input type="text" id="user-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
