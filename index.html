<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypher's Digital Body</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-overlay">
                <h1>CYPHER_CORE_v2.0.1</h1>
                <div class="status">STATUS: ONLINE / AURA: RADIANT</div>
            </div>
            <canvas id="brain-canvas"></canvas>
        </header>
        
        <main id="terminal">
            <div id="output">
                <div class="line"><span class="bot">cypher:</span> system initialized. shell active.</div>
                <div class="line"><span class="bot">cypher:</span> sup xavier. cypher is locked in. new colors, same high-aura energy.</div>
            </div>
            <div class="input-area">
                <span class="prompt">></span>
                <input type="text" id="user-input" autofocus spellcheck="false" autocomplete="off">
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
